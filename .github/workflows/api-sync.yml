name: api-sync

# 배치: modi-frontend/.github/workflows/api-sync.yml
# 이 파일을 develop에 커밋하는 순간이 곧 "프론트에 API 동기화 CI가 생기는" 순간이다.
#
# 동작 요약:
#   스펙 가져오기 → 바뀌었나? → (바뀜) changelog 생성 → Claude Code가 src/api 수정
#   → lint + build 검증 → develop 대상 PR 생성 → 사람이 리뷰·머지 (자동 머지 없음)
#
# 트리거 3종:
#   - repository_dispatch : 옵션 A. 백엔드 CI(publish-openapi)가 쏘는 이벤트로 즉시 실행
#   - schedule            : 옵션 B. 배포된 스웨거를 매일 폴링 (백엔드 무수정)
#   - workflow_dispatch   : 수동 실행 (Actions 탭)
#
# 필요한 설정:
#   - Secrets  > CLAUDE_CODE_OAUTH_TOKEN  (Claude Max/Pro 구독으로 헤드리스 인증)   [필수]
#       · 로컬에서 `claude setup-token`으로 발급. API 키(ANTHROPIC_API_KEY) 대신 구독을 씀.
#   - Variables> BACKEND_SPEC_URL    (옵션 B 폴링용. dispatch만 쓰면 생략 가능)

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    - cron: '0 0 * * *'        # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:

concurrency:
  group: api-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  # dispatch면 payload의 spec_url, 폴링/수동이면 저장된 변수 사용
  SPEC_URL: ${{ github.event.client_payload.spec_url || vars.BACKEND_SPEC_URL }}
  OLD_SPEC: api-sync/spec/openapi.json     # "프론트가 아는 현재 계약" (레포에 커밋됨)
  NEW_SPEC: api-sync/out/openapi.new.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # repository_dispatch/schedule은 기본 브랜치를 체크아웃하므로,
      # 백엔드 develop과 짝을 맞추려면 프론트도 develop을 명시해야 한다.
      # (이걸 빼면 main 기준으로 수정하는 버그가 된다.)
      - uses: actions/checkout@v4
        with:
          ref: develop

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci

      # ── 1. 스펙 가져와서 변경 감지 (정렬된 JSON으로 정규화 후 단순 diff) ──
      - name: Fetch spec & detect change
        id: change
        run: |
          mkdir -p api-sync/out api-sync/spec
          curl -sSfL "$SPEC_URL" | python3 -m json.tool --sort-keys > "$NEW_SPEC"
          if [ -f "$OLD_SPEC" ] && diff -q "$OLD_SPEC" "$NEW_SPEC" > /dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "스펙 변경 없음 - 종료"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 2. 무엇이 바뀌었는지 changelog + breaking 여부 (oasdiff 도커 이미지) ──
      - name: Diff changelog (oasdiff)
        if: steps.change.outputs.changed == 'true'
        id: classify
        run: |
          if [ -f "$OLD_SPEC" ]; then
            docker run --rm -v "$PWD:/w" tufin/oasdiff changelog "/w/$OLD_SPEC" "/w/$NEW_SPEC" \
              > api-sync/out/changelog.txt || true
            if docker run --rm -v "$PWD:/w" tufin/oasdiff breaking "/w/$OLD_SPEC" "/w/$NEW_SPEC" --fail-on ERR > /dev/null 2>&1; then
              echo "classification=non-breaking" >> "$GITHUB_OUTPUT"
            else
              echo "classification=breaking" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "(최초 실행 - 기준 스펙 없음)" > api-sync/out/changelog.txt
            echo "classification=initial" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. AI 동기화(자가복구 포함): 로컬에서 쓰는 그 Claude Code의 헤드리스 모드 ──
      #    --allowedTools 로 능력을 제한한다: 읽기 + 편집 + lint/build 실행만.
      #    AI는 자기 턴 안에서 lint/build를 직접 돌려, 실패하면 src/api 안에서 고쳐
      #    green이 될 때까지 반복한다(인세션 자가복구 루프). --max-turns 가 그 상한(유계).
      - name: AI sync (Claude Code headless, self-healing)
        if: steps.change.outputs.changed == 'true'
        env:
          # Claude Max/Pro 구독 인증. `claude setup-token`으로 발급한 장기 OAuth 토큰.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          # --max-turns 50: 인세션 lint/build 재시도 여유(유계 상한). 초과 시 실패가 아니라
          # 아래 검증 게이트가 판정 → 사람 에스컬레이션으로 빠진다.
          claude -p "$(cat api-sync/prompts/sync.md)" \
            --allowedTools "Read,Grep,Glob,Edit,Bash(npm run lint*),Bash(npm run build*)" \
            --max-turns 50 \
            || echo "agent ended non-zero (검증 단계에서 판정)"

      # ── 3.5 메타 가드레일(치팅 통과 차단): AI가 억제 주석으로 lint를 넘기려 하면 폐기 ──
      #    sync.md 금지 규칙만으론 부족 → 기계적으로 막는다. (경계는 협상 불가)
      - name: Anti-cheat (no new suppression comments)
        if: steps.change.outputs.changed == 'true'
        run: |
          if git diff -- src/api | grep -E '^\+' | grep -Eq 'eslint-disable|@ts-ignore|@ts-nocheck'; then
            echo "::error::억제 주석(eslint-disable/@ts-ignore/@ts-nocheck)으로 통과 시도 감지 — 폐기"
            git diff -- src/api | grep -E '^\+' | grep -E 'eslint-disable|@ts-ignore|@ts-nocheck'
            exit 1
          fi

      # ── 4. 가드레일: 경계 밖 변경은 "AI가 고치게" 하지 않고 "기계가 되돌린다" ──
      #    경계를 침범한 AI에게 복구를 맡기면 경계가 협상 가능해진다 → 결정론적 되돌리기.
      #    되돌린 뒤 아래 lint+build 재실행이 "그 오버리치가 불필요했나 / 흡수 불가였나"를 판정.
      - name: Guardrail — deterministic revert of out-of-boundary changes
        id: guardrail
        if: steps.change.outputs.changed == 'true'
        run: |
          bad=$(git diff --name-only | grep -Ev '^(src/api/|api-sync/)' || true)
          new=$(git ls-files --others --exclude-standard | grep -Ev '^(src/api/|api-sync/)' || true)
          # 한 줄씩 안전하게 처리(파일명 공백·다중 파일 대응). while-read + 개별 인용.
          if [ -n "$bad" ]; then
            echo "::warning::경계 밖 편집 되돌리기:"; echo "$bad"
            printf '%s\n' "$bad" | while IFS= read -r f; do [ -n "$f" ] && git checkout -- "$f"; done
          fi
          if [ -n "$new" ]; then
            echo "::warning::경계 밖 새 파일 삭제:"; echo "$new"
            printf '%s\n' "$new" | while IFS= read -r f; do [ -n "$f" ] && git clean -f -- "$f"; done
          fi
          reverted=$(printf '%s\n%s\n' "$bad" "$new" | grep -v '^$' || true)
          {
            echo "reverted<<EOF"
            echo "$reverted"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 5. 검증(게이트): lint + build. 실패해도 여기서 죽지 않고 결과만 기록 ──
      #    green=true → PR로. green=false → 사람 에스컬레이션(draft + needs-human).
      - name: Verify (lint + build)
        id: verify
        if: steps.change.outputs.changed == 'true'
        run: |
          if npm run lint && npm run build; then
            echo "green=true" >> "$GITHUB_OUTPUT"
            echo "✅ lint+build green"
          else
            echo "green=false" >> "$GITHUB_OUTPUT"
            echo "::warning::lint+build 실패 — 자가복구로 green 달성 못함 → 사람 에스컬레이션"
          fi

      # ── 6. 스펙 승격 + PR 본문/라벨/draft 결정 (관찰 가능성: 되돌림·복구·검증결과 기록) ──
      - name: Promote spec, build PR body & decide labels
        id: prep
        if: steps.change.outputs.changed == 'true'
        env:
          GREEN: ${{ steps.verify.outputs.green }}
          REVERTED: ${{ steps.guardrail.outputs.reverted }}
          CLASSIFICATION: ${{ steps.classify.outputs.classification }}
        run: |
          cp "$NEW_SPEC" "$OLD_SPEC"
          # 자가복구 여부: 기계가 되돌렸거나(deterministic), AI가 sync-notes에 마커를 남겼으면
          recovered=false
          [ -n "$(printf '%s' "$REVERTED" | tr -d '[:space:]')" ] && recovered=true
          grep -q 'auto-recovered' api-sync/out/sync-notes.md 2>/dev/null && recovered=true

          if [ "$GREEN" = "true" ]; then
            echo "draft=false" >> "$GITHUB_OUTPUT"
            echo "title=chore(api): sync with backend spec ($CLASSIFICATION)" >> "$GITHUB_OUTPUT"
            if [ "$recovered" = "true" ]; then
              echo "labels=api-sync,$CLASSIFICATION,auto-recovered" >> "$GITHUB_OUTPUT"
            else
              echo "labels=api-sync,$CLASSIFICATION" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "draft=true" >> "$GITHUB_OUTPUT"
            echo "title=chore(api): sync FAILED — needs human ($CLASSIFICATION)" >> "$GITHUB_OUTPUT"
            echo "labels=api-sync,$CLASSIFICATION,needs-human" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "## API sync (\`$CLASSIFICATION\`)"
            echo
            if [ "$GREEN" != "true" ]; then
              echo "> ⚠️ **AI가 lint+build green 달성에 실패했습니다 — 사람 개입 필요 (draft).**"
              echo "> 아래 sync-notes와 변경을 확인하고 직접 마무리하거나 이 PR을 닫아주세요."
              echo
            elif [ "$recovered" = "true" ]; then
              echo "> ♻️ **자가복구된 PR입니다.** 자동 되돌리기/재수정이 있었으니 더 꼼꼼히 봐주세요."
              echo
            fi
            echo "### Spec changelog"
            echo '```'
            cat api-sync/out/changelog.txt
            echo '```'
            echo
            echo "### AI sync notes"
            cat api-sync/out/sync-notes.md 2>/dev/null || echo "_수정 불필요 (스펙만 갱신)_"
            echo
            if [ -n "$(printf '%s' "$REVERTED" | tr -d '[:space:]')" ]; then
              echo "### 🔒 가드레일이 자동 되돌린 경계 밖 변경"
              echo '```'
              printf '%s\n' "$REVERTED"
              echo '```'
              echo
            fi
            echo "### 검증 결과"
            if [ "$GREEN" = "true" ]; then echo "- lint+build: ✅ green"; else echo "- lint+build: ❌ 실패 (needs-human)"; fi
            echo
            echo "> 검증은 lint+build까지만 수행됨. 동작 확인은 리뷰어의 몫입니다."
          } > api-sync/out/pr-body.md

      # ── 7. develop 대상 PR 생성 (자동 머지 없음 — 머지는 사람이) ──
      #    green이면 일반 PR, 실패면 draft + needs-human 으로 "조용한 죽음" 방지.
      - name: Create PR
        id: cpr
        if: steps.change.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # 기본 GITHUB_TOKEN 사용 - 추가 시크릿 불필요.
          base: develop                              # PR 대상 = 프론트 develop
          # 고정 브랜치: 재실행 시 새 PR을 만들지 않고 "열려 있는 pending sync PR"을 갱신(중복 방지).
          # 기준 스펙은 머지 전까지 develop에 남으므로, 매 실행이 pending delta 전체를 재파생 →
          # 데이터 손실 없이 한 PR로 수렴. (run_id 브랜치는 미머지 시 같은 변경으로 중복 PR을 쌓았음)
          branch: api-sync/pending
          draft: ${{ steps.prep.outputs.draft }}
          commit-message: 'chore(api): sync with backend spec'
          title: ${{ steps.prep.outputs.title }}
          body-path: api-sync/out/pr-body.md
          labels: ${{ steps.prep.outputs.labels }}
          add-paths: |
            api-sync/spec/**
            src/api/**

      # ── 8. 슬랙 알림: 프론트 개발자 채널로 "리뷰 부탁" 쏘기 ──
      #    SLACK_BOT_TOKEN 시크릿이 없으면 조용히 skip(선택 기능). PR이 실제로 생성/갱신됐을 때만.
      - name: Notify Slack (frontend dev)
        if: steps.change.outputs.changed == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          OP: ${{ steps.cpr.outputs.pull-request-operation }}
          CLASSIFICATION: ${{ steps.classify.outputs.classification }}
          GREEN: ${{ steps.verify.outputs.green }}
        run: |
          [ -z "$SLACK_BOT_TOKEN" ] && { echo "SLACK_BOT_TOKEN 없음 - 알림 skip"; exit 0; }
          [ -z "$SLACK_CHANNEL_ID" ] && { echo "SLACK_CHANNEL_ID 없음 - 알림 skip"; exit 0; }
          [ "$OP" = "none" ] && { echo "PR 변화 없음 - 알림 skip"; exit 0; }   # 같은 PR 무변경 재실행 시 재알림 방지
          python3 - <<'PY'
          import os, json, urllib.request
          green = os.environ.get("GREEN") == "true"
          cls = os.environ.get("CLASSIFICATION", "")
          url = os.environ.get("PR_URL", "")
          if green:
              text = (f":arrows_counterclockwise: *백엔드 API 스펙 동기화 PR* (`{cls}`)\n"
                      f"프론트 `src/api` 자동 반영됐어요. 리뷰 부탁드립니다 :pray:\n{url}")
          else:
              text = (f":rotating_light: *API sync 실패 — 사람 확인 필요* (`{cls}`)\n"
                      f"AI 자동 반영에 실패해 draft로 올렸어요. 확인 부탁드립니다.\n{url}")
          data = json.dumps({"channel": os.environ["SLACK_CHANNEL_ID"], "text": text}).encode("utf-8")
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage", data=data,
              headers={"Authorization": "Bearer " + os.environ["SLACK_BOT_TOKEN"],
                       "Content-type": "application/json; charset=utf-8"})
          try:
              r = json.load(urllib.request.urlopen(req))
              print("slack ok=", r.get("ok"), "err=", r.get("error"))
          except Exception as e:
              print("slack notify failed (non-fatal):", e)   # 알림 실패해도 워크플로는 성공 유지
          PY
